name: Build and deploy

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: [self-hosted, dmoench-dell]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy (local copy)
        run: rsync -a --delete public/ /srv/refit-blog/public/
